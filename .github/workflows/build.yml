name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-latest
            platform: darwin/arm64
            artifact: MyPhotoManager-macos-arm64
            bundle_path: build/bin/MyPhotoManager.app
          - name: macOS (amd64)
            os: macos-13
            platform: darwin/amd64
            artifact: MyPhotoManager-macos-amd64
            bundle_path: build/bin/MyPhotoManager.app
          - name: Linux (amd64)
            os: ubuntu-latest
            platform: linux/amd64
            artifact: MyPhotoManager-linux-amd64
            bundle_path: build/bin/myphoto
            build_tags: webkit2_41
          - name: Windows (amd64)
            os: windows-latest
            platform: windows/amd64
            artifact: MyPhotoManager-windows-amd64
            bundle_path: build/bin/myphoto.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.build_tags }}" ]; then
            wails build -platform ${{ matrix.platform }} -clean -tags ${{ matrix.build_tags }}
          else
            wails build -platform ${{ matrix.platform }} -clean
          fi

      - name: Package macOS bundle (zip)
        if: runner.os == 'macOS'
        working-directory: build/bin
        run: zip -r MyPhotoManager.app.zip MyPhotoManager.app

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/MyPhotoManager.app.zip
          if-no-files-found: error

      - name: Upload artifact (Linux/Windows)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Re-package per release
        run: |
          mkdir -p release
          for dir in dist/*/; do
            name=$(basename "$dir")
            cd "$dir"
            if compgen -G "*.app.zip" > /dev/null; then
              # macOS: già zippato
              cp *.app.zip "../../release/${name}.zip"
            else
              # Linux/Windows: zippa il binario
              zip -j "../../release/${name}.zip" *
            fi
            cd ../..
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
